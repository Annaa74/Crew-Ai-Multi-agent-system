name: 🚀 Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile*'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build and push Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          tags: ghcr.io/${{ github.repository }}-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Create push notification comment
        if: always()
        run: |
          echo "## Docker Build Status ✅" >> $GITHUB_STEP_SUMMARY
          echo "- API Image: ghcr.io/${{ github.repository }}-api:latest" >> $GITHUB_STEP_SUMMARY
          echo "- UI Image: ghcr.io/${{ github.repository }}-ui:latest" >> $GITHUB_STEP_SUMMARY
