version: '3.8'

services:
  # FastAPI Backend Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiring-assistant-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=gpt-4-turbo-preview
      - SERPER_API_KEY=${SERPER_API_KEY}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
      - LOG_LEVEL=INFO
    volumes:
      - ./data/chroma:/app/data/chroma
      - ./src:/app/src
    command: python -m src.api.main
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hiring-network
    restart: unless-stopped

  # Streamlit UI Service
  ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: hiring-assistant-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./src/ui:/app/src/ui
    command: streamlit run src/ui/streamlit_app.py
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hiring-network
    restart: unless-stopped

  # Optional: Chroma Persistent Volume
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: hiring-assistant-chroma
    ports:
      - "8010:8000"
    volumes:
      - chroma-data:/chroma/data
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/chroma/data
    networks:
      - hiring-network
    restart: unless-stopped

networks:
  hiring-network:
    driver: bridge

volumes:
  chroma-data:
    driver: local
